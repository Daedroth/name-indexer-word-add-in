<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Gear icon for settings -->
  <defs>
    <style>
      .gear { fill: #0078d4; }
    </style>
  </defs>
  
  <!-- Center circle -->
  <circle cx="16" cy="16" r="4" class="gear"/>
  
  <!-- Top gear tooth -->
  <rect x="14" y="2" width="4" height="4" class="gear"/>
  
  <!-- Bottom gear tooth -->
  <rect x="14" y="26" width="4" height="4" class="gear"/>
  
  <!-- Left gear tooth -->
  <rect x="2" y="14" width="4" height="4" class="gear"/>
  
  <!-- Right gear tooth -->
  <rect x="26" y="14" width="4" height="4" class="gear"/>
  
  <!-- Diagonal teeth -->
  <g class="gear">
    <!-- Top-right -->
    <rect x="22" y="6" width="3" height="3" transform="rotate(45 23.5 7.5)"/>
    <!-- Bottom-right -->
    <rect x="22" y="23" width="3" height="3" transform="rotate(45 23.5 24.5)"/>
    <!-- Top-left -->
    <rect x="7" y="6" width="3" height="3" transform="rotate(45 8.5 7.5)"/>
    <!-- Bottom-left -->
    <rect x="7" y="23" width="3" height="3" transform="rotate(45 8.5 24.5)"/>
  </g>
</svg>