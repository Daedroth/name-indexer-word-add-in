<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Blue rounded-square background -->
  <rect width="100" height="100" rx="18" fill="#0078d4"/>
  <!-- Subtle diagonal accent line (index marker motif) -->
  <line x1="70" y1="18" x2="84" y2="78"
        stroke="rgba(255,255,255,0.18)" stroke-width="10" stroke-linecap="round"/>
  <!-- Armenian letter Ա — white, bold, centered -->
  <text x="50" y="72"
        text-anchor="middle"
        font-family="Noto Sans Armenian, Mshtakan, serif"
        font-size="66"
        font-weight="700"
        fill="#ffffff">Ա</text>
</svg>