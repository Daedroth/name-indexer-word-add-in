<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Armenian Name Indexer</title>

    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>

    <!-- Styles -->
    <link href="taskpane.css" rel="stylesheet" type="text/css" />
</head>

<body data-theme="light">

    <!-- ── Header ── -->
    <header class="header">
        <img class="header-icon" src="/assets/icon-32.png" alt="" aria-hidden="true" />
        <h1 class="title">Name Indexer</h1>
    </header>

    <!-- ── Sideload notice ── -->
    <section id="sideload-msg">
        <p>Please <a target="_blank"
            href="https://learn.microsoft.com/office/dev/add-ins/testing/test-debug-office-add-ins#sideload-an-office-add-in-for-testing"
            >sideload</a> your add-in to see the app.</p>
    </section>

    <!-- ── Main app body ── -->
    <main id="app-body" style="display: none;" aria-label="Armenian Name Indexer">

        <!-- Actions -->
        <section class="action-group" aria-label="Main actions">
            <div class="action-row">
                <button id="index-btn" class="action-button primary">Index Names</button>
                <button id="preview-btn" class="action-button secondary">Preview</button>
            </div>
            <button id="clear-btn" class="action-button danger">Clear All Entries</button>
        </section>

        <!-- Progress -->
        <section id="progress-section" aria-label="Operation progress" style="display: none;">
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"
                     role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
            <div class="progress-footer">
                <p id="status-text" class="status-text"></p>
                <button id="cancel-btn" class="cancel-button" style="display: none;">Cancel</button>
            </div>
        </section>

        <!-- Result messages -->
        <section id="result-section" aria-live="polite" role="status" style="display: none;">
            <div id="result-message" class="message"></div>
        </section>

        <!-- Preview results -->
        <section id="preview-section" class="preview-section" style="display: none;">
            <div class="preview-header">
                <span class="preview-title">Preview</span>
                <span id="preview-count" class="preview-count"></span>
            </div>
            <ul id="preview-list" class="preview-list" aria-label="Names that would be indexed"></ul>
        </section>

        <hr class="section-divider" />

        <!-- Settings -->
        <section aria-label="Settings">
            <h2 class="section-title">Settings</h2>
            <div class="settings-card">

                <!-- Exceptions -->
                <div class="setting-group">
                    <label for="exceptions-textarea" class="setting-label">Exceptions</label>
                    <p class="setting-hint">Words to skip — comma or newline separated</p>
                    <textarea id="exceptions-textarea" rows="4"
                        placeholder="Երևան, Հայաստան, ..."></textarea>
                    <div class="file-upload-group">
                        <button class="file-button"
                            onclick="document.getElementById('exceptions-file').click()">
                            Upload File
                        </button>
                        <input type="file" id="exceptions-file" accept=".txt" style="display: none;" />
                        <span id="file-name" class="file-name"></span>
                    </div>
                </div>

                <!-- Pattern -->
                <div class="setting-group">
                    <label for="pattern-input" class="setting-label">Pattern (regex)</label>
                    <p class="setting-hint">Auto-updated when word count changes</p>
                    <input type="text" id="pattern-input"
                        spellcheck="false" autocomplete="off"
                        placeholder="[\u0531-\u0556][\u0561-\u0586]+" />
                </div>

                <!-- Suffixes -->
                <div class="setting-group">
                    <label for="suffixes-textarea" class="setting-label">Suffixes to remove</label>
                    <p class="setting-hint">Unicode-escaped, comma-separated</p>
                    <textarea id="suffixes-textarea" rows="3"
                        spellcheck="false"
                        placeholder="\u056B\u0581, \u056B\u0576, \u0578\u057E, ..."></textarea>
                </div>

                <!-- Word count -->
                <div class="setting-group">
                    <label class="setting-label">Word count</label>
                    <p class="setting-hint">Min – max words per name (auto-updates pattern)</p>
                    <div class="word-count-inputs">
                        <input type="number" id="wordcount-min" min="1" max="10" value="2"
                            aria-label="Minimum word count" />
                        <span class="word-count-separator">to</span>
                        <input type="number" id="wordcount-max" min="1" max="10" value="3"
                            aria-label="Maximum word count" />
                    </div>
                </div>

                <!-- Settings actions -->
                <div class="settings-actions">
                    <button id="save-btn">Save</button>
                    <button id="load-btn">Load</button>
                    <button id="reset-btn">Reset</button>
                </div>

            </div><!-- /.settings-card -->
        </section>

    </main>
</body>

</html>
